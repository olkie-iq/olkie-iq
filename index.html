<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم أولكي | Olkie World</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-orange: #ff8c00;
            --dark-bg: #000000;
            --morning-bg: #2196f3;
            --glass: rgba(255, 140, 0, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.4s ease; }
        body, html { margin: 0; padding: 0; font-family: 'Cairo', sans-serif; overflow-x: hidden; min-height: 100vh; }
        
        /* التحكم بالخلفية بناءً على الوضع */
        body.night { background-color: var(--dark-bg); color: white; }
        body.morning { background-color: var(--morning-bg); color: white; }

        #matrix-canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.25; }

        /* شاشة الترحيب */
        #welcome-screen {
            position: fixed; width: 100%; height: 100vh; background: inherit;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        .profile-img {
            width: 150px; height: 150px; border-radius: 50%;
            border: 3px solid var(--neon-orange); box-shadow: 0 0 20px var(--neon-orange);
            margin-bottom: 20px; object-fit: cover;
        }
        
        /* المحتوى الرئيسي */
        .main-container { max-width: 800px; margin: 40px auto; padding: 20px; display: none; opacity: 0; }
        .card {
            background: rgba(0, 0, 0, 0.7); border-bottom: 2px solid var(--neon-orange);
            margin-bottom: 15px; border-radius: 10px; backdrop-filter: blur(10px);
        }
        .card-header { padding: 20px; cursor: pointer; display: flex; justify-content: space-between; color: var(--neon-orange); font-weight: 700; font-size: 1.2rem; }
        .card-content { max-height: 0; padding: 0 20px; overflow: hidden; color: #eee; line-height: 1.8; }
        .card.active .card-content { max-height: 600px; padding: 20px; }

        /* الأزرار */
        .btn-link {
            display: inline-block; padding: 10px 18px; background: var(--glass);
            border: 1px solid var(--neon-orange); color: white; text-decoration: none;
            margin: 6px; border-radius: 8px; font-size: 0.95rem; font-weight: bold;
        }
        .btn-link:hover { background: var(--neon-orange); color: black; box-shadow: 0 0 15px var(--neon-orange); }

        /* زر تبديل الوضع */
        .mode-toggle-btn {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 30px; border-radius: 30px; border: 2px solid var(--neon-orange);
            background: rgba(0,0,0,0.8); color: white; cursor: pointer; font-weight: bold; z-index: 100;
        }

        .fade-in { animation: fadeIn 0.8s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="night">

    <canvas id="matrix-canvas"></canvas>

    <div id="welcome-screen">
        <img src="olkie.jpg" class="profile-img" alt="Olkie" onerror="this.src='https://ui-avatars.com/api/?name=Olkie&background=ff8c00&color=fff'">
        <div style="font-size: 1.8rem; margin-bottom: 20px; font-weight: bold;">أهلاً في عالم أولكي</div>
        <button class="btn-link" onclick="openWorld()" style="padding: 10px 50px; font-size: 1.2rem;">دخول</button>
    </div>

    <div class="main-container" id="main-content">
        <h1 id="modeText" style="text-align: center; color: var(--neon-orange); margin-bottom: 30px;">الوضع الليلي</h1>
        
        <div class="card">
            <div class="card-header" onclick="toggleCard(this)">01. مَن أنا؟ <span>+</span></div>
            <div class="card-content">اسمي أولكي، مبرمج ومصمم، ولدي بعض مشاريع الألعاب التي برمجتها. أرجو أن تستمتعوا وأنتم تجربون ألعابي!</div>
        </div>
<div class="card">
            <div class="card-header" onclick="toggleCard(this)">02. ألعابي ومجتمعي <span>+</span></div>
            <div class="card-content">
                <a href="https://olkie-1.itch.io/" target="_blank" class="btn-link">🎮 ألعابي على Itch.io</a>
                <a href="https://discord.com/channels/1252787684947005552/1253135065865519135" target="_blank" class="btn-link">💬 مجتمع الديسكورد</a>
                <a href="https://youtube.com/@_olkie?si=kEObA2_kbXdKUb6t" target="_blank" class="btn-link">🎥 قناة اليوتيوب</a>
            </div>
        </div>

        <div class="card">
            <div class="card-header" onclick="toggleCard(this)">03. الحسابات <span>+</span></div>
            <div class="card-content">
                <a href="https://discord.com/channels/@me/1480955456280334447" target="_blank" class="btn-link">Discord Account</a>
                <a href="https://www.linkedin.com/in/olkie" target="_blank" class="btn-link">LinkedIn Profile</a>
            </div>
        </div>
    </div>

    <button class="mode-toggle-btn" onclick="toggleMode()">تبديل الوضع</button>

    <script>
        // فتح الموقع
        function openWorld() {
            document.getElementById('welcome-screen').style.display = 'none';
            const content = document.getElementById('main-content');
            content.style.display = 'block';
            setTimeout(() => content.classList.add('fade-in'), 10);
        }

        // تبديل البطاقات
        function toggleCard(header) {
            const card = header.parentElement;
            card.classList.toggle('active');
            header.querySelector('span').innerText = card.classList.contains('active') ? '-' : '+';
        }

        // تبديل الوضع (ليلي / صبحي)
        function toggleMode() {
            const body = document.body;
            const text = document.getElementById("modeText");
            if (body.classList.contains("night")) {
                body.classList.replace("night", "morning");
                text.textContent = "الوضع الصبحي";
            } else {
                body.classList.replace("morning", "night");
                text.textContent = "الوضع الليلي";
            }
        }

        // كود الماتريكس
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const chars = "OLKIE01"; const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array.from({ length: Math.floor(columns) }).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff8c00'; ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = chars.charAt(Math.floor(Math.random() * chars.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 35);
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    </script>
</body>
</html>
